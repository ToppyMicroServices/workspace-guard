name: Release Extension

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish-marketplace:
    name: Publish To VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
        with:
          node-version: 22
          cache: npm

      - name: Verify publish secret
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is required to publish to the VS Code Marketplace." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run Extension Development Host smoke test
        run: xvfb-run -a npm run test:smoke

      - name: Package extension
        run: npm run package:extension -- --out workspace-guard.vsix

      - name: Publish extension to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:extension -- --packagePath workspace-guard.vsix

      - name: Verify Marketplace release
        run: |
          EXPECTED_VERSION="$(node -p "require('./package.json').version")"
          npm run verify:marketplace-release -- \
            --publisher ToppyMicroServices \
            --name workspace-guard \
            --version "$EXPECTED_VERSION" \
            --mode universal

      - name: Upload VSIX to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" workspace-guard.vsix --clobber

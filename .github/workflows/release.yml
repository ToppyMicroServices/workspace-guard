name: Release Extension

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish-marketplace:
    name: Publish To VS Code Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Verify publish secret
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is required to publish to the VS Code Marketplace." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run Extension Development Host smoke test
        run: xvfb-run -a npm run test:smoke

      - name: Package extension
        run: npm run package:extension -- --out workspace-guard.vsix

      - name: Publish extension to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:extension -- --packagePath workspace-guard.vsix

      - name: Verify Marketplace release
        run: |
          EXPECTED_VERSION="$(node -p "require('./package.json').version")"
          for attempt in 1 2 3; do
            if npm run verify:marketplace-release -- \
              --publisher ToppyMicroServices \
              --name workspace-guard \
              --version "$EXPECTED_VERSION" \
              --mode universal \
              --timeout-seconds 180 \
              --poll-seconds 10; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Marketplace verification attempt ${attempt} failed; retrying after backoff..." >&2
            sleep 30
          done

      - name: Upload VSIX to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" workspace-guard.vsix --clobber
